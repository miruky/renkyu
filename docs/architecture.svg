<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" role="img" aria-labelledby="arch-title">
  <title id="arch-title">renkyuのアーキテクチャ図。内閣府CSVを取り込んだ祝日データの上に、日付計算と連休検出のライブラリ、年間カレンダーのUIが載る。</title>
  <style>
    :root {
      --ink: #2b2823;
      --muted: #6e675d;
      --line: #8d99a3;
      --panel: #f6f5f2;
      --accent: #b3543c;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --ink: #e8e4dc;
        --muted: #a39a8c;
        --line: #5d6a74;
        --panel: #25221e;
        --accent: #e08a6d;
      }
    }
    text { font-family: ui-sans-serif, system-ui, sans-serif; fill: var(--ink, currentColor); }
    .name { font-size: 15px; font-weight: 600; }
    .desc { font-size: 12px; fill: var(--muted, currentColor); }
    .label { font-size: 12px; fill: var(--muted, currentColor); }
    .group-name { font-size: 13px; font-weight: 600; fill: var(--muted, currentColor); letter-spacing: 0.04em; }
    .box { fill: var(--panel, none); stroke: var(--line, currentColor); stroke-width: 1.5; }
    .actor { fill: none; stroke: var(--line, currentColor); stroke-width: 1.5; stroke-dasharray: 5 4; }
    .proc { fill: none; stroke: var(--accent, currentColor); stroke-width: 1.5; }
    .flow { fill: none; stroke: var(--line, currentColor); stroke-width: 1.5; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="var(--line, currentColor)"/>
    </marker>
  </defs>

  <rect class="actor" x="32" y="48" width="184" height="64" rx="10"/>
  <text class="name" x="124" y="76" text-anchor="middle">内閣府CSV</text>
  <text class="desc" x="124" y="96" text-anchor="middle">国民の祝日(Shift_JIS)</text>

  <rect class="box" x="32" y="172" width="184" height="72" rx="10"/>
  <text class="name" x="124" y="200" text-anchor="middle">update-holidays.mjs</text>
  <text class="desc" x="124" y="220" text-anchor="middle">取得・検証・TS化</text>

  <path class="flow" d="M124 112v54"/>
  <text class="label" x="134" y="144">更新時に実行</text>

  <rect class="proc" x="264" y="24" width="360" height="332" rx="14"/>
  <text class="group-name" x="288" y="52">src/lib(依存ゼロ)</text>

  <rect class="box" x="288" y="68" width="312" height="56" rx="10"/>
  <text class="name" x="444" y="92" text-anchor="middle">data/holidays.ts</text>
  <text class="desc" x="444" y="110" text-anchor="middle">1955年からの祝日1,067件</text>

  <rect class="box" x="288" y="156" width="148" height="64" rx="10"/>
  <text class="name" x="362" y="184" text-anchor="middle">date.ts</text>
  <text class="desc" x="362" y="202" text-anchor="middle">暦の計算</text>

  <rect class="box" x="452" y="156" width="148" height="64" rx="10"/>
  <text class="name" x="526" y="184" text-anchor="middle">holiday.ts</text>
  <text class="desc" x="526" y="202" text-anchor="middle">祝日・休日の照会</text>

  <rect class="box" x="288" y="252" width="312" height="64" rx="10"/>
  <text class="name" x="444" y="278" text-anchor="middle">streak.ts</text>
  <text class="desc" x="444" y="298" text-anchor="middle">連休の検出・橋渡し提案・年間統計</text>

  <path class="flow" d="M216 208H240Q252 208 252 196V108Q252 96 264 96H280"/>
  <text class="label" x="224" y="152">生成</text>
  <path class="flow" d="M526 124v26"/>
  <path class="flow" d="M362 220v26"/>
  <path class="flow" d="M526 220v26"/>

  <rect class="actor" x="672" y="156" width="176" height="96" rx="10"/>
  <text class="name" x="760" y="186" text-anchor="middle">UI(main.ts)</text>
  <text class="desc" x="760" y="206" text-anchor="middle">12か月カレンダー</text>
  <text class="desc" x="760" y="224" text-anchor="middle">連休一覧・有給提案</text>
  <text class="desc" x="760" y="242" text-anchor="middle">URLに年を保存</text>

  <path class="flow" d="M624 284h84V252"/>
  <text class="label" x="648" y="276">利用</text>
</svg>
