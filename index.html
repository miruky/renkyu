<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="祝日と連休が一目でわかる年間カレンダー" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <title>renkyu - 祝日・連休カレンダー</title>
    <script>
      // 描画前にテーマを確定させ、リロード時のちらつきを防ぐ。
      (function () {
        try {
          var t = localStorage.getItem('renkyu-theme');
          document.documentElement.dataset.theme =
            t === 'light' || t === 'dark' || t === 'system' ? t : 'system';
        } catch (e) {
          document.documentElement.dataset.theme = 'system';
        }
      })();
    </script>
  </head>
  <body>
    <header class="site-header">
      <svg class="site-logo" viewBox="0 0 32 32" aria-hidden="true">
        <rect
          x="3"
          y="5"
          width="26"
          height="24"
          rx="5"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
        />
        <path d="M10 3v5M22 3v5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
        <rect x="17" y="16" width="7" height="7" rx="2" class="logo-accent" />
      </svg>
      <div>
        <h1>renkyu</h1>
        <p class="tagline">祝日と連休が一目でわかる年間カレンダー</p>
      </div>
      <div class="header-actions">
        <button type="button" id="theme-toggle" class="icon-btn"></button>
        <a class="repo-link" href="https://github.com/miruky/renkyu" rel="noreferrer">GitHub</a>
      </div>
    </header>

    <nav class="year-nav" aria-label="年の切り替え">
      <button type="button" id="prev-year" aria-label="前の年">&#x2039;</button>
      <h2 id="year-label">2026年</h2>
      <button type="button" id="next-year" aria-label="次の年">&#x203A;</button>
      <button type="button" id="this-year" class="ghost">今年へ</button>
    </nav>

    <section class="stats" id="stats" aria-label="年の概況"></section>

    <main class="layout">
      <section class="calendar" id="calendar" aria-label="年間カレンダー"></section>
      <aside class="rail">
        <section class="panel" aria-label="連休一覧">
          <h3>3連休以上</h3>
          <ol id="streaks" class="streak-list"></ol>
        </section>
        <section class="panel" aria-label="有給の橋渡し提案">
          <h3>有給でつなぐと</h3>
          <ol id="bridges" class="bridge-list"></ol>
        </section>
      </aside>
    </main>

    <footer class="site-footer">
      <p>
        祝日データは内閣府「国民の祝日について」のCSV(1955〜収録末年)による。休みは土日祝のみで数え、年末年始やお盆の慣習的な休暇は含めていない。
      </p>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
